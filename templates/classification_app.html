<h2 class="mt-4">Prediction Form</h2>

<form method="POST" action="/classification_app">
    <div class="mb-3">
        <label>Age</label>
        <input type="number" name="edad" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Estimated Salary</label>
        <input type="number" name="salario" class="form-control" required>
    </div>

    <button class="btn btn-success">Predict</button>
</form>
{% if result %}
<div class="alert alert-info mt-4 text-center">
    <strong>{{ result }}</strong>
</div>
{% endif %}
{% if accuracy %}
<h2 class="mt-4">Model Metrics</h2>
<ul>
    <li><strong>Accuracy:</strong> {{ accuracy }}</li>
    <li><strong>Precision:</strong> {{ precision }}</li>
    <li><strong>Recall:</strong> {{ recall }}</li>
    <li><strong>F1 Score:</strong> {{ f1 }}</li>
</ul>

<h2>Confusion Matrix</h2>
<img src="{{ url_for('static', filename='rf_confusion_matrix.png') }}" class="img-fluid">

<h2>ROC Curve</h2>
<img src="{{ url_for('static', filename='rf_roc_curve.png') }}" class="img-fluid">
{% endif %}
